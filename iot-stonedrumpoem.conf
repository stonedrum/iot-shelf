# ========== HTTP 80 端口配置（保留，不跳转 HTTPS） ==========
server {
    listen 80;
    server_name iot.stonedrumpoem.cn;
    charset utf-8;

    # 1. 优先转发 FastAPI 文档相关路径（必须在 location / 前面）
    location ~ ^/(docs|redoc|openapi.json|docs/oauth2-redirect)$ {
        proxy_pass http://127.0.0.1:8686;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        # 禁止缓存文档，避免更新不生效
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # 2. 后端 API 转发（/api 开头路由）
    location /api/ {
        proxy_pass http://127.0.0.1:8686;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
        proxy_buffering on;
    }

    # 3. WebSocket 转发（若有实时通信需求）
    location /ws/ {
        proxy_pass http://127.0.0.1:8686;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # 4. 前端静态资源（最后匹配，避免拦截其他路径）
    location / {
        root /var/www/iot-front;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # 精细化缓存：缓存静态资源，不缓存 index.html
        if ($uri != '/') {
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }
        if ($uri = '/') {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires -1;
        }
    }

    # 5. 禁止访问隐藏文件（如 .git .env）
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 日志配置（使用主配置的默认日志格式）
    access_log /var/log/nginx/iot_http_access.log;
    error_log /var/log/nginx/iot_http_error.log warn;
}

# ========== HTTPS 443 端口配置（核心） ==========
server {
    listen 443 ssl http2;
    server_name iot.stonedrumpoem.cn;
    charset utf-8;

    # SSL 证书配置（务必确认路径正确）
    ssl_certificate /etc/nginx/ssl/iot.stonedrumpoem.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/iot.stonedrumpoem.cn.key;

    # SSL 安全优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;
    # 可选：OCSP 验证根证书（根据证书提供商配置）
    # ssl_trusted_certificate /etc/nginx/ssl/root_ca.pem;

    # 1. 优先转发 FastAPI 文档相关路径
    location ~ ^/(docs|redoc|openapi.json|docs/oauth2-redirect)$ {
        proxy_pass http://127.0.0.1:8686;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # 2. 后端 API 转发
    location /api/ {
        proxy_pass http://127.0.0.1:8686;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
        proxy_buffering on;
    }

    # 3. WebSocket 转发
    location /ws/ {
        proxy_pass http://127.0.0.1:8686;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # 4. 前端静态资源
    location / {
        root /var/www/iot-front;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # 精细化缓存 + HSTS（可选，强制后续 HTTPS 访问）
        if ($uri != '/') {
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        }
        if ($uri = '/') {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            expires -1;
        }
    }

    # 5. 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 日志配置
    access_log /var/log/nginx/iot_https_access.log;
    error_log /var/log/nginx/iot_https_error.log warn;
}